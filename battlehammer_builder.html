<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Battle Hammer Army Builder</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #1b1f23;
      color: #e6edf3;
    }
    header {
      padding: 10px 16px;
      background: #24292f;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
    }
    main {
      display: grid;
      grid-template-columns: 1.1fr 1.2fr 1fr;
      gap: 8px;
      padding: 8px;
      height: calc(100vh - 50px);
      box-sizing: border-box;
    }
    section {
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px;
      box-sizing: border-box;
      overflow: auto;
      background: #0d1117;
    }
    h2 {
      margin-top: 0;
      font-size: 15px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 4px;
      margin-bottom: 6px;
    }
    .faction-select select {
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px 6px;
    }
    .unit-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .unit-card {
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .unit-card:hover {
      background: #161b22;
    }
    .unit-meta {
      font-size: 11px;
      opacity: 0.8;
    }
    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge-core { background: #116329; }
    .badge-special { background: #9e6a03; }
    .badge-rare { background: #5a32a3; }
    .badge-char { background: #0550ae; }

    .config-row {
      margin-bottom: 6px;
      font-size: 13px;
    }
    .config-row label {
      display: block;
      margin-bottom: 2px;
    }
    input[type="number"] {
      width: 80px;
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 4px;
    }
    .options-list {
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px;
      max-height: 140px;
      overflow: auto;
      font-size: 13px;
    }
    .options-list label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }
    button {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
    }
    button.secondary {
      background: #30363d;
    }
    button.danger {
      background: #da3633;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .points {
      font-weight: 600;
      font-size: 14px;
    }
    .army-unit {
      border-bottom: 1px solid #21262d;
      padding: 4px 0;
      font-size: 13px;
    }
    .army-unit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .army-unit-actions button {
      margin-left: 4px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .summary-row strong {
      font-weight: 600;
    }
    .validation {
      margin-top: 6px;
      font-size: 12px;
    }
    .validation-ok {
      color: #3fb950;
    }
    .validation-error {
      color: #f85149;
    }
    .pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 11px;
      margin-right: 4px;
    }
    .pill-ok { background: rgba(63,185,80,0.15); color: #3fb950; }
    .pill-err { background: rgba(248,81,73,0.15); color: #f85149; }
    .export-area {
      width: 100%;
      height: 120px;
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px;
      font-family: monospace;
      font-size: 11px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
<header>
  <h1>Battle Hammer – Army Builder</h1>
  <div class="faction-select">
    Fazione:
    <select id="factionSelect">
      <option value="orcs">Orchi & Goblin</option>
      <!-- altre fazioni in futuro -->
    </select>
    Punti massimi:
    <input type="number" id="maxPointsInput" value="2000" min="500" step="100" />
  </div>
</header>

<main>
  <!-- LISTA UNITÀ -->
  <section>
    <h2>Unità disponibili</h2>
    <div id="unitList" class="unit-list"></div>
  </section>

  <!-- CONFIGURATORE UNITÀ -->
  <section>
    <h2>Configurazione unità</h2>
    <div id="configPanel">
      <p style="font-size:13px; opacity:0.8;">Seleziona un'unità dalla lista per configurarla.</p>
    </div>
  </section>

  <!-- RIEPILOGO ESERCITO -->
  <section>
    <h2>Esercito</h2>
    <div id="armySummaryTop"></div>
    <hr style="border-color:#21262d;">
    <div id="armyUnits"></div>
    <hr style="border-color:#21262d;">
    <div id="validationPanel"></div>
    <h3 style="font-size:13px; margin-top:8px;">Esporta lista (testo)</h3>
    <textarea id="exportText" class="export-area" readonly></textarea>
  </section>
</main>

<script>
  // --- DATI DI ESEMPIO -------------------------------------------------------

  const ARMY_RULES = {
    min_core_pct: 25,
    max_special_pct: 50,
    max_rare_pct: 25,
    max_duplicates: 3
  };

  let UNITS_BY_FACTION = {};

  async function loadFactionData() {
  const url = "https://raw.githubusercontent.com/pinamont/battlehammer/main/data/orcs_goblins.json";

  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error("Errore nel caricamento JSON");
    const data = await response.json();

    UNITS_BY_FACTION = data;

    // dopo aver caricato i dati, renderizza tutto
    renderUnitList();
    renderConfigPanel();
    renderArmy();

  } catch (err) {
    console.error("Errore caricamento JSON:", err);
    alert("Impossibile caricare i dati dell'esercito.");
  }
}

  // --- STATO -----------------------------------------------------------------

  let currentFaction = "orcs";
  let selectedUnit = null; // oggetto unità
  let army = {
    maxPoints: 2000,
    entries: [] // { id, unitId, name, category, size, options: [optId], points }
  };
  let nextEntryId = 1;

  // --- UTILITY ---------------------------------------------------------------

  function categoryBadgeClass(cat) {
    switch (cat) {
      case "Core": return "badge badge-core";
      case "Special": return "badge badge-special";
      case "Rare": return "badge badge-rare";
      case "Character": return "badge badge-char";
      default: return "badge";
    }
  }

  function calcUnitPoints(unit, size, selectedOptionIds) {
    let total = unit.base_cost;
    if (unit.cost_per_model) {
      total += (size - unit.min_size) * unit.cost_per_model;
    }
    for (const opt of unit.options || []) {
      if (!selectedOptionIds.includes(opt.id)) continue;
      if (opt.cost) total += opt.cost;
      if (opt.cost_per_model) total += opt.cost_per_model * size;
    }
    return total;
  }

  function computeArmyStats() {
    let total = 0;
    let byCat = { Core: 0, Special: 0, Rare: 0, Character: 0 };
    for (const e of army.entries) {
      total += e.points;
      if (!byCat[e.category]) byCat[e.category] = 0;
      byCat[e.category] += e.points;
    }
    const pct = {};
    for (const cat of Object.keys(byCat)) {
      pct[cat] = total > 0 ? (byCat[cat] / total) * 100 : 0;
    }
    return { total, byCat, pct };
  }

  function validateArmy() {
    const stats = computeArmyStats();
    const errors = [];

    if (stats.total > army.maxPoints) {
      errors.push("Punti totali oltre il limite.");
    }
    if (stats.pct.Core < ARMY_RULES.min_core_pct) {
      errors.push(`Core sotto il minimo (${ARMY_RULES.min_core_pct}%).`);
    }
    if (stats.pct.Special > ARMY_RULES.max_special_pct) {
      errors.push(`Special oltre il massimo (${ARMY_RULES.max_special_pct}%).`);
    }
    if (stats.pct.Rare > ARMY_RULES.max_rare_pct) {
      errors.push(`Rare oltre il massimo (${ARMY_RULES.max_rare_pct}%).`);
    }

    // duplicati
    const counts = {};
    for (const e of army.entries) {
      counts[e.unitId] = (counts[e.unitId] || 0) + 1;
    }
    for (const [unitId, count] of Object.entries(counts)) {
      if (count > ARMY_RULES.max_duplicates) {
        errors.push(`Troppi duplicati di ${unitId} (max ${ARMY_RULES.max_duplicates}).`);
      }
    }

    return { stats, errors };
  }

  function exportArmyText() {
    const { stats } = validateArmy();
    let lines = [];
    lines.push(`Battle Hammer – Lista esercito (${currentFaction})`);
    lines.push(`Punti totali: ${stats.total}/${army.maxPoints}`);
    lines.push("");
    for (const e of army.entries) {
      lines.push(`${e.name} (${e.category}) – ${e.points} pt [${e.size} modelli]`);
    }
    return lines.join("\n");
  }

  // --- RENDERING -------------------------------------------------------------

  function renderUnitList() {
    const container = document.getElementById("unitList");
    container.innerHTML = "";
    const units = UNITS_BY_FACTION[currentFaction] || [];

    // raggruppa per categoria
    const byCat = {};
    for (const u of units) {
      if (!byCat[u.category]) byCat[u.category] = [];
      byCat[u.category].push(u);
    }

    for (const cat of ["Character", "Core", "Special", "Rare"]) {
      if (!byCat[cat] || byCat[cat].length === 0) continue;
      const title = document.createElement("div");
      title.textContent = cat;
      title.style.fontSize = "12px";
      title.style.marginTop = "4px";
      title.style.marginBottom = "2px";
      title.style.textTransform = "uppercase";
      title.style.opacity = "0.7";
      container.appendChild(title);

      for (const unit of byCat[cat]) {
        const card = document.createElement("div");
        card.className = "unit-card";
        card.onclick = () => selectUnit(unit);

        const left = document.createElement("div");
        const name = document.createElement("div");
        name.textContent = unit.name;
        const meta = document.createElement("div");
        meta.className = "unit-meta";
        meta.textContent = `Base ${unit.base_cost} pt, ${unit.min_size}-${unit.max_size} mod.`;
        left.appendChild(name);
        left.appendChild(meta);

        const right = document.createElement("div");
        const badge = document.createElement("span");
        badge.className = categoryBadgeClass(unit.category);
        badge.textContent = unit.category;
        right.appendChild(badge);

        card.appendChild(left);
        card.appendChild(right);
        container.appendChild(card);
      }
    }
  }

  function selectUnit(unit) {
    selectedUnit = unit;
    renderConfigPanel();
  }

  function renderConfigPanel(existingEntry = null) {
    const panel = document.getElementById("configPanel");
    if (!selectedUnit) {
      panel.innerHTML = "<p style='font-size:13px; opacity:0.8;'>Seleziona un'unità dalla lista per configurarla.</p>";
      return;
    }

    const unit = selectedUnit;
    const isEdit = !!existingEntry;

    const sizeValue = isEdit ? existingEntry.size : unit.min_size;
    const selectedOptionIds = new Set(isEdit ? existingEntry.options : []);

    const tempPoints = calcUnitPoints(unit, sizeValue, Array.from(selectedOptionIds));

    panel.innerHTML = "";

    const title = document.createElement("h3");
    title.textContent = unit.name;
    title.style.fontSize = "15px";
    title.style.marginTop = "0";
    panel.appendChild(title);

    const catBadge = document.createElement("span");
    catBadge.className = categoryBadgeClass(unit.category);
    catBadge.textContent = unit.category;
    panel.appendChild(catBadge);

    const baseInfo = document.createElement("div");
    baseInfo.style.fontSize = "12px";
    baseInfo.style.marginTop = "4px";
    baseInfo.textContent = `Base ${unit.base_cost} pt, ${unit.min_size}-${unit.max_size} modelli.`;
    panel.appendChild(baseInfo);

    // dimensione
    const sizeRow = document.createElement("div");
    sizeRow.className = "config-row";
    const sizeLabel = document.createElement("label");
    sizeLabel.textContent = "Dimensione unità";
    const sizeInput = document.createElement("input");
    sizeInput.type = "number";
    sizeInput.min = unit.min_size;
    sizeInput.max = unit.max_size;
    sizeInput.value = sizeValue;
    sizeInput.oninput = () => {
      const val = parseInt(sizeInput.value, 10) || unit.min_size;
      if (val < unit.min_size) sizeInput.value = unit.min_size;
      if (val > unit.max_size) sizeInput.value = unit.max_size;
      updatePointsPreview();
    };
    sizeRow.appendChild(sizeLabel);
    sizeRow.appendChild(sizeInput);
    panel.appendChild(sizeRow);

    // opzioni
    const optsRow = document.createElement("div");
    optsRow.className = "config-row";
    const optsLabel = document.createElement("label");
    optsLabel.textContent = "Opzioni";
    optsRow.appendChild(optsLabel);

    const optsBox = document.createElement("div");
    optsBox.className = "options-list";

    if (!unit.options || unit.options.length === 0) {
      const noOpt = document.createElement("div");
      noOpt.style.opacity = "0.7";
      noOpt.textContent = "Nessuna opzione disponibile.";
      optsBox.appendChild(noOpt);
    } else {
      for (const opt of unit.options) {
        const row = document.createElement("label");
        const left = document.createElement("span");
        const right = document.createElement("span");

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = selectedOptionIds.has(opt.id);
        cb.onchange = () => {
          if (cb.checked) selectedOptionIds.add(opt.id);
          else selectedOptionIds.delete(opt.id);
          updatePointsPreview();
        };

        left.appendChild(cb);
        const text = document.createTextNode(" " + opt.name);
        left.appendChild(text);

        let costText = "";
        if (opt.cost) costText += `+${opt.cost} pt`;
        if (opt.cost_per_model) {
          if (costText) costText += ", ";
          costText += `+${opt.cost_per_model} pt/mod.`;
        }
        right.textContent = costText;

        row.appendChild(left);
        row.appendChild(right);
        optsBox.appendChild(row);
      }
    }

    optsRow.appendChild(optsBox);
    panel.appendChild(optsRow);

    // punti
    const pointsRow = document.createElement("div");
    pointsRow.className = "config-row";
    const pointsSpan = document.createElement("span");
    pointsSpan.className = "points";
    pointsSpan.id = "pointsPreview";
    pointsSpan.textContent = `Punti unità: ${tempPoints}`;
    pointsRow.appendChild(pointsSpan);
    panel.appendChild(pointsRow);

    // pulsanti
    const btnRow = document.createElement("div");
    btnRow.className = "config-row";

    const mainBtn = document.createElement("button");
    mainBtn.textContent = isEdit ? "Aggiorna unità" : "Aggiungi all'esercito";
    mainBtn.onclick = () => {
      const size = parseInt(sizeInput.value, 10) || unit.min_size;
      const opts = Array.from(selectedOptionIds);
      const pts = calcUnitPoints(unit, size, opts);

      if (isEdit) {
        existingEntry.size = size;
        existingEntry.options = opts;
        existingEntry.points = pts;
      } else {
        army.entries.push({
          id: nextEntryId++,
          unitId: unit.id,
          name: unit.name,
          category: unit.category,
          size,
          options: opts,
          points: pts
        });
      }
      renderArmy();
    };
    btnRow.appendChild(mainBtn);

    if (isEdit) {
      const cancelBtn = document.createElement("button");
      cancelBtn.textContent = "Annulla";
      cancelBtn.className = "secondary";
      cancelBtn.style.marginLeft = "4px";
      cancelBtn.onclick = () => {
        selectedUnit = null;
        renderConfigPanel();
      };
      btnRow.appendChild(cancelBtn);
    }

    panel.appendChild(btnRow);

    function updatePointsPreview() {
      const size = parseInt(sizeInput.value, 10) || unit.min_size;
      const pts = calcUnitPoints(unit, size, Array.from(selectedOptionIds));
      pointsSpan.textContent = `Punti unità: ${pts}`;
    }
  }

  function renderArmy() {
    const { stats, errors } = validateArmy();

    // top summary
    const top = document.getElementById("armySummaryTop");
    top.innerHTML = "";

    const totalRow = document.createElement("div");
    totalRow.className = "summary-row";
    totalRow.innerHTML = `<strong>Punti totali</strong><span>${stats.total} / ${army.maxPoints}</span>`;
    top.appendChild(totalRow);

    const cats = ["Character", "Core", "Special", "Rare"];
    for (const cat of cats) {
      const row = document.createElement("div");
      row.className = "summary-row";
      const pct = stats.pct[cat] || 0;
      row.innerHTML = `<span>${cat}</span><span>${pct.toFixed(1)}%</span>`;
      top.appendChild(row);
    }

    // army units
    const list = document.getElementById("armyUnits");
    list.innerHTML = "";
    if (army.entries.length === 0) {
      list.innerHTML = "<p style='font-size:13px; opacity:0.8;'>Nessuna unità nell'esercito.</p>";
    } else {
      for (const e of army.entries) {
        const div = document.createElement("div");
        div.className = "army-unit";

        const header = document.createElement("div");
        header.className = "army-unit-header";

        const left = document.createElement("div");
        left.innerHTML = `<strong>${e.name}</strong> <span style="font-size:11px; opacity:0.8;">(${e.category}, ${e.size} mod.)</span>`;

        const right = document.createElement("div");
        right.textContent = `${e.points} pt`;

        header.appendChild(left);
        header.appendChild(right);
        div.appendChild(header);

        if (e.options && e.options.length > 0) {
          const optsLine = document.createElement("div");
          optsLine.style.fontSize = "11px";
          optsLine.style.opacity = "0.8";
          const unit = UNITS_BY_FACTION[currentFaction].find(u => u.id === e.unitId);
          const names = [];
          for (const optId of e.options) {
            const opt = unit.options.find(o => o.id === optId);
            if (opt) names.push(opt.name);
          }
          optsLine.textContent = "Opzioni: " + names.join(", ");
          div.appendChild(optsLine);
        }

        const actions = document.createElement("div");
        actions.className = "army-unit-actions";
        actions.style.marginTop = "2px";

        const editBtn = document.createElement("button");
        editBtn.textContent = "Modifica";
        editBtn.className = "secondary";
        editBtn.onclick = () => {
          selectedUnit = UNITS_BY_FACTION[currentFaction].find(u => u.id === e.unitId);
          renderConfigPanel(e);
        };

        const delBtn = document.createElement("button");
        delBtn.textContent = "Rimuovi";
        delBtn.className = "danger";
        delBtn.onclick = () => {
          army.entries = army.entries.filter(x => x.id !== e.id);
          renderArmy();
        };

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        div.appendChild(actions);

        list.appendChild(div);
      }
    }

    // validation
    const val = document.getElementById("validationPanel");
    val.innerHTML = "";

    const pills = document.createElement("div");
    const coreOk = stats.pct.Core >= ARMY_RULES.min_core_pct;
    const specialOk = stats.pct.Special <= ARMY_RULES.max_special_pct;
    const rareOk = stats.pct.Rare <= ARMY_RULES.max_rare_pct;
    const pointsOk = stats.total <= army.maxPoints;

    function pill(text, ok) {
      const span = document.createElement("span");
      span.className = "pill " + (ok ? "pill-ok" : "pill-err");
      span.textContent = text;
      return span;
    }

    pills.appendChild(pill("Core min", coreOk));
    pills.appendChild(pill("Special max", specialOk));
    pills.appendChild(pill("Rare max", rareOk));
    pills.appendChild(pill("Punti", pointsOk));
    val.appendChild(pills);

    const msg = document.createElement("div");
    msg.className = "validation";
    if (errors.length === 0) {
      msg.innerHTML = `<div class="validation-ok">✔ Lista valida secondo le regole base.</div>`;
    } else {
      msg.innerHTML = `<div class="validation-error">✘ Problemi nella lista:</div>`;
      const ul = document.createElement("ul");
      ul.style.marginTop = "2px";
      ul.style.paddingLeft = "18px";
      for (const err of errors) {
        const li = document.createElement("li");
        li.textContent = err;
        ul.appendChild(li);
      }
      msg.appendChild(ul);
    }
    val.appendChild(msg);

    // export
    document.getElementById("exportText").value = exportArmyText();
  }

  // --- EVENTI GLOBALI --------------------------------------------------------

  document.getElementById("factionSelect").addEventListener("change", (e) => {
    currentFaction = e.target.value;
    army.entries = [];
    selectedUnit = null;
    renderUnitList();
    renderConfigPanel();
    renderArmy();
  });

  document.getElementById("maxPointsInput").addEventListener("input", (e) => {
    const val = parseInt(e.target.value, 10) || 500;
    army.maxPoints = val;
    renderArmy();
  });

  // --- INIT ------------------------------------------------------------------

  // renderUnitList();
  // renderConfigPanel();
  // renderArmy();
  loadFactionData();
</script>
</body>
</html>

  <h1>Battle Hammer – Army Builder</h1>
  <div id="headerControls">
    <div style="display: inline">
      Fazione:
      <select id="factionSelect" style="width:140px; background:#0d1117; color:#e6edf3; border:1px solid #30363d; border-radius:4px; padding:2px 4px;"></select>
    </div>
    <div style="display: inline">
      Nome esercito:
      <input
        type="text"
        id="listTitleInput"
        placeholder="Titolo..."
        style="width:160px; background:#0d1117; color:#e6edf3; border:1px solid #30363d; border-radius:4px; padding:2px 4px;"
      />
    </div>
    <div style="display: inline">
      Punti massimi:
      <input
        type="number"
        id="maxPointsInput"
        value="2000"
        min="500"
        step="100"
        style="width:59px; background:#0d1117; color:#e6edf3; border:1px solid #30363d; border-radius:4px; padding:2px 4px;"
      />
      <button id="maxPointsDownBtn" style="width:24px" class="secondary">–</button>
      <button id="maxPointsUpBtn" style="width:24px" class="secondary">+</button>
    </div>
    <div id="globalActions" style="display: inline" class="global-actions">
      <button id="openLoadModalBtn" class="primary">Carica</button>
      <button id="openSaveModalBtn" class="danger">Salva</button>
    </div>
  </div>

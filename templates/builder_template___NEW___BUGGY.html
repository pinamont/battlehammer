<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Battle Hammer Army Builder</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #1b1f23;
      color: #e6edf3;
    }
    header {
      padding: 10px 16px;
      background: #24292f;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
    }
    main {
      display: grid;
      grid-template-columns: 1.1fr 1.2fr 1fr;
      gap: 8px;
      padding: 8px;
      height: calc(100vh - 50px);
      box-sizing: border-box;
    }
    section {
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px;
      box-sizing: border-box;
      overflow: auto;
      background: #0d1117;
    }
    h2 {
      margin-top: 0;
      font-size: 15px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 4px;
      margin-bottom: 6px;
    }
    .faction-select select {
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px 6px;
    }
    .unit-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .unit-card {
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .unit-card:hover {
      background: #161b22;
    }
    .unit-meta {
      font-size: 11px;
      opacity: 0.8;
    }
    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge-personaggi { background: #0550ae; }
    .badge-truppe { background: #116329; }
    .badge-macchine { background: #5a32a3; }

    .config-row {
      margin-bottom: 6px;
      font-size: 13px;
    }
    .config-row label {
      display: block;
      margin-bottom: 2px;
    }
    input[type="number"] {
      width: 80px;
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 4px;
    }
    .options-list {
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px;
      max-height: 140px;
      overflow: auto;
      font-size: 13px;
    }
    .options-list label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }
    button {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
    }
    button.secondary {
      background: #30363d;
    }
    button.danger {
      background: #da3633;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .points {
      font-weight: 600;
      font-size: 14px;
    }
    .army-unit {
      border-bottom: 1px solid #21262d;
      padding: 4px 0;
      font-size: 13px;
    }
    .army-unit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .army-unit-actions button {
      margin-left: 4px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .summary-row strong {
      font-weight: 600;
    }
    .validation {
      margin-top: 6px;
      font-size: 12px;
    }
    .validation-ok {
      color: #3fb950;
    }
    .validation-error {
      color: #f85149;
    }
    .pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 11px;
      margin-right: 4px;
    }
    .pill-ok { background: rgba(63,185,80,0.15); color: #3fb950; }
    .pill-err { background: rgba(248,81,73,0.15); color: #f85149; }
    .export-area {
      width: 100%;
      height: 120px;
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px;
      font-family: monospace;
      font-size: 11px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
<header>
  <h1>Battle Hammer – Army Builder (Prototype)</h1>
  <div class="faction-select">
    Fazione:
    <select id="factionSelect">
      <option value="OrchiGoblin">Orchi e Goblin</option>
      <option value="dwarfs">Nani</option>
      <!-- altre fazioni in futuro -->
    </select>
    Titolo lista:
<!--     <input type="text" id="listTitleInput" placeholder="Titolo..." style="width:160px;" /> -->
    <input
      type="text"
      id="listTitleInput"
      placeholder="Titolo..."
      style="width:160px; background:#0d1117; color:#e6edf3; border:1px solid #30363d; border-radius:4px; padding:2px 4px;"
    />
    Punti massimi:
    <input type="number" id="maxPointsInput" value="2000" min="500" step="100" />
  </div>
</header>

<main>
  <!-- LISTA UNITÀ -->
  <section>
    <h2>Unità disponibili</h2>
    <div id="unitList" class="unit-list"></div>
  </section>

  <!-- CONFIGURATORE UNITÀ -->
  <section>
    <h2>Configurazione unità</h2>
    <div id="configPanel">
      <p style="font-size:13px; opacity:0.8;">Seleziona un'unità dalla lista per configurarla.</p>
    </div>
  </section>

  <!-- RIEPILOGO ESERCITO -->
  <section>
    <h2>Esercito</h2>
    <div id="armySummaryTop"></div>
    <hr style="border-color:#21262d;">
    <div id="armyUnits"></div>
    <hr style="border-color:#21262d;">
    <div id="validationPanel"></div>
    <h3 style="font-size:13px; margin-top:8px;">Esporta lista</h3>
    <button id="exportTextBtn" class="secondary">Scarica come testo</button>
    <button id="exportJsonBtn" class="secondary">Scarica come JSON</button>
    <h3 style="font-size:13px; margin-top:12px;">Importa lista</h3>
    <button id="importBtn" class="secondary">Importa da JSON</button>
    <input type="file" id="importFile" accept="application/json" style="display:none;">
  </section>
</main>

<!-- QUI INIETTERAI IL JSON CON PYTHON -->

__FACTION_JSON__
</script>

<script id="ITEM_DATA" type="application/json">
__ITEM_JSON__
</script>

<script>
  // --- REGOLE DI COMPOSIZIONE ----------------------------------------------

  const ARMY_RULES = {
    min_truppe_pct: 25,
    max_personaggi_pct: 50,
    max_macchine_pct: 25
  };

  // --- DATI CARICATI INLINE DAL TAG JSON -----------------------------------

  const UNITS_BY_FACTION = JSON.parse(
    document.getElementById("FACTION_DATA").textContent
  );

  const MAGIC_ITEMS = JSON.parse(
    document.getElementById("ITEM_DATA").textContent
  ).magic_items;

  const MAGIC_BANNERS = JSON.parse(
    document.getElementById("ITEM_DATA").textContent
  ).magic_banners;

  // Dividi gli oggetti magici in categorie
  const magicByCategory = {};
  for (const item of MAGIC_ITEMS) {
    if (!magicByCategory[item.category]) {
      magicByCategory[item.category] = [];
    }
    magicByCategory[item.category].push(item);
  }

  // --- STATO ----------------------------------------------------------------

  let currentFaction = "OrchiGoblin";
  let army = {
    maxPoints: 2000,
    entries: []
  };
  let selectedUnit = null;
  let nextEntryId = 1;

  // --- UTILITY --------------------------------------------------------------

  function categoryBadgeClass(cat) {
    switch (cat) {
      case "Personaggi": return "badge badge-personaggi";
      case "Truppe": return "badge badge-truppe";
      case "Macchine e Mostri": return "badge badge-macchine";
      default: return "badge";
    }
  }

  function calcUnitPoints(unit, size, selectedOptionIds, optionCounts = {}, magicItems = [], magicBanner = null) {
    let total = unit.cost_per_model * size;
    for (const opt of unit.options || []) {
      if (!selectedOptionIds.includes(opt.id)) continue;
      const count = optionCounts[opt.id] ?? 1;
      if (opt.max_count) {
        if (opt.cost) total += opt.cost * count;
        if (opt.cost_per_model) total += opt.cost_per_model * size * count;
      } else {
        if (opt.cost) total += opt.cost;
        if (opt.cost_per_model) total += opt.cost_per_model * size;
      }
    }
    if (magicItems) {
      for (const id of magicItems) {
        const item = MAGIC_ITEMS.find(m => m.id === id);
        if (item) total += item.cost;
      }
    }
    if (magicBanner) {
      const banner = MAGIC_BANNERS.find(b => b.id === magicBanner);
      if (banner) total += banner.cost;
    }
    return total;
  }

  function computeArmyStats() {
    let total = 0;
    let byCat = { "Personaggi": 0, "Truppe": 0, "Macchine e Mostri": 0 };
    for (const e of army.entries) {
      total += e.points;
      if (!byCat[e.category]) byCat[e.category] = 0;
      byCat[e.category] += e.points;
    }
    const pct = {};
    for (const cat of Object.keys(byCat)) {
      pct[cat] = total > 0 ? (byCat[cat] / total) * 100 : 0;
    }
    return { total, byCat, pct };
  }

  function isMagicItemTaken(itemId, currentEntryId = null) {
    for (const e of army.entries) {
      if (e.id === currentEntryId) continue;
      if (e.magicItems && e.magicItems.includes(itemId)) return true;
    }
    return false;
  }

  function isMagicBannerTaken(bannerId, currentEntryId = null) {
    for (const e of army.entries) {
      if (e.id === currentEntryId) continue;
      if (e.magicBanner === bannerId) return true;
    }
    return false;
  }

  function validateArmy() {
    const stats = computeArmyStats();
    const errors = [];

    if (stats.total > army.maxPoints) {
      errors.push("Punti totali oltre il limite.");
    }
    if (stats.pct["Truppe"] < ARMY_RULES.min_truppe_pct) {
      errors.push(`Truppe sotto il minimo (${ARMY_RULES.min_truppe_pct}%).`);
    }
    if (stats.pct["Personaggi"] > ARMY_RULES.max_personaggi_pct) {
      errors.push(`Personaggi oltre il massimo (${ARMY_RULES.max_personaggi_pct}%).`);
    }
    if (stats.pct["Macchine e Mostri"] > ARMY_RULES.max_macchine_pct) {
      errors.push(`Macchine e Mostri oltre il massimo (${ARMY_RULES.max_macchine_pct}%).`);
    }

    const hasPersonaggio = army.entries.some(e => e.category === "Personaggi");
    if (!hasPersonaggio) {
      errors.push("Devi includere almeno un Personaggio.");
    }

    const counts = {};
    for (const e of army.entries) {
      counts[e.unitId] = (counts[e.unitId] || 0) + 1;
    }

    return { stats, errors, hasPersonaggio };
  }

  // ---------------------------------------------------------------------------
  // EXPORT JSON
  // ---------------------------------------------------------------------------
  function exportArmyJson() {
    const { stats } = validateArmy();

    return JSON.stringify({
      title: document.getElementById("listTitleInput").value || "Lista senza titolo",
      faction: currentFaction,
      max_points: army.maxPoints,
      total_points: stats.total,
      units: army.entries.map(e => ({
        id: e.id,
        unitId: e.unitId,
        name: e.name,
        category: e.category,
        size: e.size,
        options: e.options,
        optionCounts: e.optionCounts,
        magicItems: e.magicItems,
        magicBanner: e.magicBanner,
        points: e.points
      }))
    }, null, 2);
  }

  // ---------------------------------------------------------------------------
  // IMPORT JSON
  // ---------------------------------------------------------------------------
  function importArmyJson(data) {
    if (!data.units || !Array.isArray(data.units)) {
      alert("JSON non valido: manca la lista delle unità.");
      return;
    }

    // Titolo
    document.getElementById("listTitleInput").value = data.title || "";

    // Fazione
    if (data.faction && UNITS_BY_FACTION[data.faction]) {
      currentFaction = data.faction;
      document.getElementById("factionSelect").value = data.faction;
    }

    // Punti massimi
    if (data.max_points) {
      army.maxPoints = data.max_points;
      document.getElementById("maxPointsInput").value = data.max_points;
    }

    // Ricostruisci unità
    army.entries = data.units.map(u => ({
      id: nextEntryId++,
      unitId: u.unitId,
      name: u.name,
      category: u.category,
      size: u.size,
      options: u.options || [],
      optionCounts: u.optionCounts || {},
      magicItems: u.magicItems || [],
      magicBanner: u.magicBanner || null,
      points: u.points
    }));

    renderUnitList();
    clearConfigPanel();
    renderArmy();

    alert("Lista importata correttamente.");
  }

  // --- RENDERING ------------------------------------------------------------

  function renderModelCount(entry) {
    const unit = UNITS_BY_FACTION[currentFaction].find(u => u.id === entry.unitId);

    // Se min = max = 1 → non mostrare nulla
    if (unit.min_size === 1 && unit.max_size === 1) {
      return "";
    }

    return `<span style="font-size:11px; opacity:0.8;">(${entry.size} mod.)</span>`;
  }

  function renderUnitList() {
    const container = document.getElementById("unitList");
    container.innerHTML = "";
    const units = UNITS_BY_FACTION[currentFaction] || [];

    const byCat = {};
    for (const u of units) {
      if (!byCat[u.category]) byCat[u.category] = [];
      byCat[u.category].push(u);
    }

    const order = ["Personaggi", "Truppe", "Macchine e Mostri"];
    for (const cat of order) {
      if (!byCat[cat] || byCat[cat].length === 0) continue;
      const title = document.createElement("div");
      title.textContent = cat;
      title.style.fontSize = "12px";
      title.style.marginTop = "4px";
      title.style.marginBottom = "2px";
      title.style.textTransform = "uppercase";
      title.style.opacity = "0.7";
      container.appendChild(title);

      for (const unit of byCat[cat]) {
        const card = document.createElement("div");
        card.className = "unit-card";
        card.onclick = () => selectUnit(unit);

        const left = document.createElement("div");
        const name = document.createElement("div");
        name.textContent = unit.name;
        const meta = document.createElement("div");
        meta.className = "unit-meta";
        if (unit.min_size === 1 && unit.max_size === 1) {
          meta.textContent = `${unit.cost_per_model} pt`;
        } else {
          meta.textContent = `${unit.cost_per_model} pt/mod., ${unit.min_size}-${unit.max_size} mod.`;
        }
        left.appendChild(name);
        left.appendChild(meta);

        const right = document.createElement("div");
        right.textContent = "";

        card.appendChild(left);
        card.appendChild(right);
        container.appendChild(card);
      }
    }
  }

  function selectUnit(unit) {
    selectedUnit = unit;
    renderConfigPanel();
  }

  // ---------------------------------------------------------------------------
  // RENDER CONFIG PANEL (VERSIONE MODULARE)
  // ---------------------------------------------------------------------------

  let isBuilding = true;

  function renderConfigPanel(existingEntry = null) {

    const panel = document.getElementById("configPanel");
    if (!selectedUnit) {
      return clearConfigPanel();
    }

    const unit = selectedUnit;
    const isEdit = !!existingEntry;

    // --- Stato locale dell’unità in modifica ---------------------------------
    let size = isEdit ? existingEntry.size : unit.min_size;
    let selectedOptionIds = new Set(isEdit ? existingEntry.options : []);
    let optionCounts = isEdit ? { ...existingEntry.optionCounts } : {};
    let selectedMagicItems = new Set(isEdit ? existingEntry.magicItems : []);
    let selectedMagicBanner = isEdit ? existingEntry.magicBanner : null;

    panel.innerHTML = "";

    // -------------------------------------------------------------------------
    // 1. HEADER
    // -------------------------------------------------------------------------
    renderHeader(panel, unit);

    // -------------------------------------------------------------------------
    // 2. SELETTORE NUMERO MODELLI
    // -------------------------------------------------------------------------
    const sizeInput = renderSizeSelector(panel, unit, size, () => {
      size = parseInt(sizeInput.value, 10) || unit.min_size;
      updatePointsPreview();
    });

    // -------------------------------------------------------------------------
    // 3. OPZIONI UNITÀ
    // -------------------------------------------------------------------------
    let magicBannerWrapper = null;

    const optionsBox = renderOptions(
      panel,
      unit,
      selectedOptionIds,
      optionCounts,
      () => updatePointsPreview(),
      () => {
        selectedMagicBanner = null;
        if (magicBannerWrapper) {
          magicBannerWrapper.style.display = "none";
          magicBannerWrapper
            .querySelectorAll('input[type="radio"]')
            .forEach(r => r.checked = false);
        }
      },
      () => {
        // chiamato quando clicchi l’opzione "stendardo"
        if (!magicBannerWrapper) return;
        const can = canUnitTakeMagicBanner(unit, selectedOptionIds);
        magicBannerWrapper.style.display = can ? "block" : "none";
        if (!can) {
          selectedMagicBanner = null;
          magicBannerWrapper
            .querySelectorAll('input[type="radio"]')
            .forEach(r => r.checked = false);
        }
      }
    );

    // -------------------------------------------------------------------------
    // 4. STENDARDO MAGICO
    // -------------------------------------------------------------------------
    magicBannerWrapper = renderMagicBannerSection(
      panel,
      unit,
      selectedOptionIds,
      selectedMagicBanner,
      (newVal) => {
        selectedMagicBanner = newVal;
        updatePointsPreview();
      }
    );

    // -------------------------------------------------------------------------
    // 5. OGGETTI MAGICI
    // -------------------------------------------------------------------------
    renderMagicItemsSection(
      panel,
      unit,
      selectedMagicItems,
      selectedOptionIds,
      existingEntry,
      () => updatePointsPreview()
    );

    // -------------------------------------------------------------------------
    // 6. FOOTER (PUNTI + BOTTONI)
    // -------------------------------------------------------------------------
    renderFooterButtons(
      panel,
      unit,
      isEdit,
      sizeInput,
      selectedOptionIds,
      optionCounts,
      selectedMagicItems,
      selectedMagicBanner,
      existingEntry
    );

    // -------------------------------------------------------------------------
    // FUNZIONE INTERNA: aggiorna anteprima punti
    // -------------------------------------------------------------------------
    function updatePointsPreview() {
      const pts = calcUnitPoints(
        unit,
        parseInt(sizeInput.value, 10) || unit.min_size,
        Array.from(selectedOptionIds),
        optionCounts,
        Array.from(selectedMagicItems),
        selectedMagicBanner
      );
      document.getElementById("pointsPreview").textContent = `Punti unità: ${pts}`;
    }
    isBuilding = false;
  }

  // ---------------------------------------------------------------------------
  // HEADER
  // ---------------------------------------------------------------------------
  function renderHeader(panel, unit) {
    const title = document.createElement("h3");
    title.textContent = unit.name;
    title.style.fontSize = "15px";
    title.style.margin = "0 0 2px 0";
    panel.appendChild(title);

    const info = document.createElement("div");
    info.style.fontSize = "12px";
    info.style.opacity = 0.7;

    if (unit.min_size === 1 && unit.max_size === 1) {
      info.textContent = `${unit.cost_per_model} pt (modello singolo)`;
    } else {
      info.textContent = `${unit.cost_per_model} pt/mod., ${unit.min_size}-${unit.max_size} modelli`;
    }

    panel.appendChild(info);
  }

  // ---------------------------------------------------------------------------
  // SIZE SELECTOR
  // ---------------------------------------------------------------------------
  function renderSizeSelector(panel, unit, size, onChange) {
    if (unit.min_size === 1 && unit.max_size === 1) return { value: 1 };

    const row = document.createElement("div");
    row.className = "config-row";

    const label = document.createElement("label");
    label.textContent = "Numero di modelli";
    row.appendChild(label);

    const input = document.createElement("input");
    input.type = "number";
    input.min = unit.min_size;
    input.max = unit.max_size;
    input.value = size;

    input.oninput = () => {
      const v = parseInt(input.value, 10) || unit.min_size;
      input.value = Math.min(unit.max_size, Math.max(unit.min_size, v));
      onChange();
    };

    row.appendChild(input);
    panel.appendChild(row);

    return input;
  }

  // ---------------------------------------------------------------------------
  // OPZIONI UNITÀ
  // ---------------------------------------------------------------------------
  function renderOptions(panel, unit, selectedOptionIds, optionCounts, onChange, onRemoveBanner, onToggleBanner) {
    const row = document.createElement("div");
    row.className = "config-row";

    const label = document.createElement("label");
    label.textContent = "Opzioni";
    row.appendChild(label);

    const box = document.createElement("div");
    box.className = "options-list";

    if (!unit.options || unit.options.length === 0) {
      const noOpt = document.createElement("div");
      noOpt.style.opacity = 0.7;
      noOpt.textContent = "Nessuna opzione disponibile.";
      box.appendChild(noOpt);
    } else {
      for (const opt of unit.options) {
        const line = document.createElement("div");
        line.className = "option-row";
        line.style.display = "flex";
        line.style.justifyContent = "space-between";

        const left = document.createElement("span");
        const right = document.createElement("span");

        if (opt.max_count) {
          // Opzione con quantità
          const qty = document.createElement("input");
          qty.type = "number";
          qty.min = 0;
          qty.max = opt.max_count;
          qty.value = optionCounts[opt.id] ?? 0;

          qty.oninput = () => {
            const v = Math.max(0, Math.min(opt.max_count, parseInt(qty.value) || 0));
            qty.value = v;
            if (v > 0) selectedOptionIds.add(opt.id);
            else selectedOptionIds.delete(opt.id);
            optionCounts[opt.id] = v;
            onChange();
          };

          left.appendChild(qty);
        } else {
          // Checkbox
          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = selectedOptionIds.has(opt.id);
          if (opt.id === "stendardo") {
              onToggleBanner();
          }
          cb.onchange = () => {
            if (cb.checked) selectedOptionIds.add(opt.id);
            else selectedOptionIds.delete(opt.id);
            if (opt.id === "stendardo" && onToggleBanner) {
              onToggleBanner();
            }
            onChange();
          };

          left.appendChild(cb);
        }

        left.appendChild(document.createTextNode(" " + opt.name));

        let costText = "";
        if (opt.cost) costText += `+${opt.cost} pt`;
        if (opt.cost_per_model) {
          if (costText) costText += ", ";
          costText += `+${opt.cost_per_model} pt/mod.`;
        }
        right.textContent = costText;

        line.appendChild(left);
        line.appendChild(right);
        box.appendChild(line);
      }
    }

    row.appendChild(box);
    panel.appendChild(row);

    return box;
  }

  // ---------------------------------------------------------------------------
  // STENDARDO MAGICO
  // ---------------------------------------------------------------------------
  function renderMagicBannerSection(
    panel,
    unit,
    selectedOptionIds,
    selectedMagicBanner,
    onSelect
  ) {
    const canTake = canUnitTakeMagicBanner(unit, selectedOptionIds);

    const wrapper = document.createElement("div");
    wrapper.style.display = canTake ? "block" : "none";

    const box = document.createElement("div");
    box.style.marginTop = "8px";
    box.style.border = "1px solid #30363d";
    box.style.borderRadius = "6px";

    const header = document.createElement("div");
    header.textContent = "Stendardo Magico";
    header.style.padding = "6px 8px";
    header.style.cursor = "pointer";
    header.style.background = "#161b22";
    header.style.fontWeight = "bold";

    const content = document.createElement("div");
    content.style.display = "none";
    content.style.padding = "6px 8px";

    header.onclick = () => {
      content.style.display = content.style.display === "none" ? "block" : "none";
    };

    // Nessuno
    const none = document.createElement("div");
    const noneRb = document.createElement("input");
    noneRb.type = "radio";
    noneRb.name = "magic_banner_choice";
    noneRb.checked = !selectedMagicBanner;

    noneRb.onchange = () => onSelect(null);

    none.appendChild(noneRb);
    none.appendChild(document.createTextNode(" Nessuno"));
    content.appendChild(none);

    // Banner disponibili
    for (const banner of MAGIC_BANNERS) {
      const row = document.createElement("div");
      const rb = document.createElement("input");
      rb.type = "radio";
      rb.name = "magic_banner_choice";
      rb.value = banner.id;
      rb.checked = selectedMagicBanner === banner.id;

      rb.onchange = () => {
        if (isBuilding) return;   // <--- AGGIUNGI QUESTO
        if (!banner.allow_multiple && isMagicBannerTaken(banner.id)) {
          alert("Questo stendardo è già stato preso.");
          rb.checked = false;
          noneRb.checked = true;
          return;
        }
        onSelect(banner.id);
      };

      row.appendChild(rb);
      row.appendChild(document.createTextNode(" " + banner.name));
      content.appendChild(row);
    }

    box.appendChild(header);
    box.appendChild(content);
    wrapper.appendChild(box);
    panel.appendChild(wrapper);

    return wrapper;
  }

  function canUnitTakeMagicBanner(unit, selectedOptionIds) {
    return unit.magic_banner_slot || selectedOptionIds.has("stendardo");
  }

  // ---------------------------------------------------------------------------
  // OGGETTI MAGICI
  // ---------------------------------------------------------------------------
  function renderMagicItemsSection(
    panel,
    unit,
    selectedMagicItems,
    selectedOptionIds,
    existingEntry,
    onChange
  ) {
    if (!unit.magic_item_slots) return;

    const title = document.createElement("div");
    title.style.marginTop = "10px";
    title.textContent = `Oggetti Magici (fino a ${unit.magic_item_slots})`;
    panel.appendChild(title);

    for (const [category, items] of Object.entries(magicByCategory)) {
      const box = document.createElement("div");
      box.style.marginTop = "8px";
      box.style.border = "1px solid #30363d";
      box.style.borderRadius = "6px";

      const header = document.createElement("div");
      header.textContent = category;
      header.style.padding = "6px 8px";
      header.style.cursor = "pointer";
      header.style.background = "#161b22";
      header.style.fontWeight = "bold";

      const content = document.createElement("div");
      content.style.display = "none";
      content.style.padding = "6px 8px";

      header.onclick = () => {
        content.style.display = content.style.display === "none" ? "block" : "none";
      };

      for (const item of items) {
        const row = document.createElement("div");
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = selectedMagicItems.has(item.id);
        cb.onchange = () => {
          if (cb.checked) {
            if (selectedMagicItems.size >= unit.magic_item_slots) {
              alert("Hai raggiunto il limite.");
              cb.checked = false;
              return;
            }
            if (!item.allow_multiple && isMagicItemTaken(item.id, existingEntry?.id)) {
              alert("Oggetto già preso da un'altra unità.");
              cb.checked = false;
              return;
            }
            selectedMagicItems.add(item.id);
          } else {
            selectedMagicItems.delete(item.id);
          }
          onChange();
        };

        row.appendChild(cb);
        row.appendChild(document.createTextNode(" " + item.name));
        content.appendChild(row);
      }

      box.appendChild(header);
      box.appendChild(content);
      panel.appendChild(box);
    }
  }

  // ---------------------------------------------------------------------------
  // FOOTER (PUNTI + BOTTONI)
  // ---------------------------------------------------------------------------
  function renderFooterButtons(
    panel,
    unit,
    isEdit,
    sizeInput,
    selectedOptionIds,
    optionCounts,
    selectedMagicItems,
    selectedMagicBanner,
    existingEntry
  ) {
    const pts = calcUnitPoints(
      unit,
      parseInt(sizeInput.value, 10) || unit.min_size,
      Array.from(selectedOptionIds),
      optionCounts,
      Array.from(selectedMagicItems),
      selectedMagicBanner
    );

    const pointsRow = document.createElement("div");
    pointsRow.className = "config-row";

    const span = document.createElement("span");
    span.id = "pointsPreview";
    span.className = "points";
    span.textContent = `Punti unità: ${pts}`;
    pointsRow.appendChild(span);
    panel.appendChild(pointsRow);

    const btnRow = document.createElement("div");
    btnRow.className = "config-row";

    const mainBtn = document.createElement("button");
    mainBtn.textContent = isEdit ? "Aggiorna unità" : "Aggiungi all'esercito";

    mainBtn.onclick = () => {
      const size = parseInt(sizeInput.value, 10) || unit.min_size;
      const entry = {
        id: isEdit ? existingEntry.id : nextEntryId++,
        unitId: unit.id,
        name: unit.name,
        category: unit.category,
        size,
        options: Array.from(selectedOptionIds),
        optionCounts,
        magicItems: Array.from(selectedMagicItems),
        magicBanner: selectedMagicBanner,
        points: calcUnitPoints(
          unit,
          size,
          Array.from(selectedOptionIds),
          optionCounts,
          Array.from(selectedMagicItems),
          selectedMagicBanner
        )
      };

      if (isEdit) {
        Object.assign(existingEntry, entry);
      } else {
        army.entries.push(entry);
      }

      clearConfigPanel();
      renderArmy();
    };

    btnRow.appendChild(mainBtn);

    if (isEdit) {
      const cancel = document.createElement("button");
      cancel.textContent = "Annulla";
      cancel.className = "secondary";
      cancel.onclick = () => {
        selectedUnit = null;
        clearConfigPanel();
      };
      btnRow.appendChild(cancel);
    }

    panel.appendChild(btnRow);
  }

  // ---------------------------------------------------------------------------
  // CLEAR PANEL
  // ---------------------------------------------------------------------------
  function clearConfigPanel() {
    const panel = document.getElementById("configPanel");
    panel.innerHTML = "";
    const msg = document.createElement("div");
    msg.style.opacity = 0.7;
    msg.style.fontStyle = "italic";
    msg.textContent = "Seleziona un'unità per configurarla.";
    panel.appendChild(msg);
  }

  function clearConfigPanel() {
    const panel = document.getElementById("configPanel");
    panel.innerHTML = "";
    const msg = document.createElement("div");
    msg.style.opacity = "0.7";
    msg.style.fontStyle = "italic";
    msg.textContent = "Seleziona un'unità per configurarla.";
    panel.appendChild(msg);
  }

  // ---------------------------------------------------------------------------
  // RENDER ARMY (VERSIONE MODULARE)
  // ---------------------------------------------------------------------------

  function renderArmy() {
    const { stats, errors, hasPersonaggio } = validateArmy();

    renderArmySummary(stats);
    renderArmyUnits();
    renderArmyValidation(stats, errors, hasPersonaggio);
  }

  // ---------------------------------------------------------------------------
  // 1. RIEPILOGO SUPERIORE
  // ---------------------------------------------------------------------------
  function renderArmySummary(stats) {
    const top = document.getElementById("armySummaryTop");
    top.innerHTML = "";

    const totalRow = document.createElement("div");
    totalRow.className = "summary-row";
    totalRow.innerHTML = `<strong>Punti totali</strong><span>${stats.total} / ${army.maxPoints}</span>`;
    top.appendChild(totalRow);

    const cats = ["Personaggi", "Truppe", "Macchine e Mostri"];
    for (const cat of cats) {
      const row = document.createElement("div");
      row.className = "summary-row";
      row.innerHTML = `<span>${cat}</span><span>${stats.pct[cat].toFixed(1)}%</span>`;
      top.appendChild(row);
    }
  }

  // ---------------------------------------------------------------------------
  // 2. LISTA UNITÀ
  // ---------------------------------------------------------------------------
  function renderArmyUnits() {
    const list = document.getElementById("armyUnits");
    list.innerHTML = "";

    const order = ["Personaggi", "Truppe", "Macchine e Mostri"];

    for (const cat of order) {
      const entries = army.entries.filter(e => e.category === cat);
      if (entries.length === 0) continue;

      // Titolo categoria
      const title = document.createElement("div");
      title.textContent = cat;
      title.style.fontSize = "12px";
      title.style.marginTop = "6px";
      title.style.marginBottom = "4px";
      title.style.textTransform = "uppercase";
      title.style.opacity = "0.7";
      list.appendChild(title);

      for (const e of entries) {
        list.appendChild(renderArmyUnitCard(e));
      }
    }
  }

  // ---------------------------------------------------------------------------
  // 2a. CARD DI UNA SINGOLA UNITÀ
  // ---------------------------------------------------------------------------
  function renderArmyUnitCard(e) {
    const div = document.createElement("div");
    div.className = "army-unit";

    const header = document.createElement("div");
    header.className = "army-unit-header";

    // Nome cliccabile
    const left = document.createElement("div");
    left.innerHTML = `<strong class="editable-unit">${e.name}</strong> ${renderModelCount(e)}`;
    left.querySelector(".editable-unit").style.cursor = "pointer";
    left.querySelector(".editable-unit").onclick = () => {
      selectedUnit = UNITS_BY_FACTION[currentFaction].find(u => u.id === e.unitId);
      renderConfigPanel(e);
    };

    // Punti + rimozione
    const right = document.createElement("div");
    right.innerHTML = `
      <span>${e.points} pt</span>
      <span class="remove-unit" style="margin-left:8px; cursor:pointer; color:#f85149; font-weight:bold;">✖</span>
    `;
    right.querySelector(".remove-unit").onclick = () => {
      army.entries = army.entries.filter(x => x.id !== e.id);
      renderArmy();
    };

    header.appendChild(left);
    header.appendChild(right);
    div.appendChild(header);

    // Opzioni
    if (e.options?.length) {
      const unit = UNITS_BY_FACTION[currentFaction].find(u => u.id === e.unitId);
      const parts = e.options.map(optId => {
        const opt = unit.options.find(o => o.id === optId);
        if (!opt) return null;
        const count = e.optionCounts?.[optId] || 1;
        return opt.max_count ? `${opt.name} ×${count}` : opt.name;
      }).filter(Boolean);

      const line = document.createElement("div");
      line.style.fontSize = "11px";
      line.style.opacity = "0.8";
      line.textContent = parts.join(", ");
      div.appendChild(line);
    }

    // Oggetti Magici
    if (e.magicItems?.length) {
      const names = e.magicItems
        .map(id => MAGIC_ITEMS.find(m => m.id === id)?.name)
        .filter(Boolean);

      const line = document.createElement("div");
      line.style.fontSize = "11px";
      line.style.opacity = "0.8";
      line.textContent = names.join(", ");
      div.appendChild(line);
    }

    // Stendardo Magico
    if (e.magicBanner) {
      const banner = MAGIC_BANNERS.find(b => b.id === e.magicBanner);
      if (banner) {
        const line = document.createElement("div");
        line.style.fontSize = "11px";
        line.style.opacity = "0.8";
        line.textContent = banner.name;
        div.appendChild(line);
      }
    }

    return div;
  }

  // ---------------------------------------------------------------------------
  // 3. VALIDAZIONE
  // ---------------------------------------------------------------------------
  function renderArmyValidation(stats, errors, hasPersonaggio) {
    const val = document.getElementById("validationPanel");
    val.innerHTML = "";

    const pills = document.createElement("div");

    function pill(text, ok) {
      const span = document.createElement("span");
      span.className = "pill " + (ok ? "pill-ok" : "pill-err");
      span.textContent = text;
      return span;
    }

    pills.appendChild(pill("Truppe min", stats.pct["Truppe"] >= ARMY_RULES.min_truppe_pct));
    pills.appendChild(pill("Personaggi max", stats.pct["Personaggi"] <= ARMY_RULES.max_personaggi_pct));
    pills.appendChild(pill("Macchine/Mostri max", stats.pct["Macchine e Mostri"] <= ARMY_RULES.max_macchine_pct));
    pills.appendChild(pill("Punti", stats.total <= army.maxPoints));
    pills.appendChild(pill("Personaggio obbligatorio", hasPersonaggio));

    val.appendChild(pills);

    const msg = document.createElement("div");
    msg.className = "validation";

    if (errors.length === 0) {
      msg.innerHTML = `<div class="validation-ok">✔ Lista valida secondo le regole base.</div>`;
    } else {
      msg.innerHTML = `<div class="validation-error">✘ Problemi nella lista:</div>`;
      const ul = document.createElement("ul");
      ul.style.marginTop = "2px";
      ul.style.paddingLeft = "18px";
      for (const err of errors) {
        const li = document.createElement("li");
        li.textContent = err;
        ul.appendChild(li);
      }
      msg.appendChild(ul);
    }

    val.appendChild(msg);
  }

  // --- EVENTI GLOBALI -------------------------------------------------------

  document.getElementById("factionSelect").addEventListener("change", (e) => {
    currentFaction = e.target.value;
    army.entries = [];
    selectedUnit = null;
    renderUnitList();
    renderConfigPanel();
    renderArmy();
  });

  document.getElementById("maxPointsInput").addEventListener("input", (e) => {
    const val = parseInt(e.target.value, 10) || 500;
    army.maxPoints = val;
    renderArmy();
  });

  // --- ESPORTAZIONE -----------------------------------------------------------

  // Scarica file di testo
  document.getElementById("exportTextBtn").addEventListener("click", () => {
    const text = exportArmyText();
    downloadFile(text, "lista.txt", "text/plain");
  });

  document.getElementById("exportJsonBtn").addEventListener("click", () => {
    const json = exportArmyJson();
    downloadFile(json, "lista.json", "application/json");
  });

  // Funzione generica per scaricare file
  function downloadFile(content, filename, mime) {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();

    URL.revokeObjectURL(url);
  }

  // --- IMPORTAZIONE -----------------------------------------------------------

  // Apri il selettore file
  document.getElementById("importBtn").addEventListener("click", () => {
    document.getElementById("importFile").click();
  });

  // Gestisci il file selezionato
  document.getElementById("importFile").addEventListener("change", (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        importArmyJson(data);
      } catch (err) {
        alert("Errore: il file non è un JSON valido.");
        console.error(err);
      }
    };
    reader.readAsText(file);
  });

  // Ricostruisce l'esercito dalla struttura JSON esportata
  function importArmyJson(data) {
    // Validazione minima
    if (!data.units || !Array.isArray(data.units)) {
      alert("JSON non valido: manca la lista delle unità.");
      return;
    }

    // Titolo
    if (data.title) {
      document.getElementById("listTitleInput").value = data.title;
    }

    // Fazione
    if (data.faction && UNITS_BY_FACTION[data.faction]) {
      currentFaction = data.faction;
      document.getElementById("factionSelect").value = data.faction;
    } else {
      alert("Attenzione: la fazione nel JSON non è riconosciuta.");
    }

    // Punti massimi
    if (data.max_points) {
      army.maxPoints = data.max_points;
      document.getElementById("maxPointsInput").value = data.max_points;
    }

    // Ricostruisci unità
    army.entries = [];

    for (const u of data.units) {
      army.entries.push({
        id: nextEntryId++,
        unitId: u.unitId,
        name: u.name,
        category: u.category,
        size: u.size,
        options: u.options || [],
        optionCounts: u.optionCounts || {},
        magicItems: u.magicItems || [],
        magicBanner: u.magicBanner || null,
        points: u.points
      });
    }

    // Aggiorna UI
    renderUnitList();
    renderConfigPanel();
    renderArmy();

    alert("Lista importata correttamente.");
  }

  // --- INIT -----------------------------------------------------------------

  renderUnitList();
  renderConfigPanel();
  renderArmy();
</script>
</body>
</html>

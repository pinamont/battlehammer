  <meta charset="UTF-8" />
  <title>Battle Hammer Army Builder</title>
  <div id="mobileTabs" class="mobile-only">
    <button data-tab="settings">Impostazioni</button>
    <button data-tab="units">Unità</button>
    <button data-tab="config">Config</button>
    <button data-tab="army">Esercito</button>
  </div>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #1b1f23;
      color: #e6edf3;
    }
    header {
      padding: 10px 16px;
      background: #1b1f23;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
    }
    main {
      display: grid;
      grid-template-columns: 1.1fr 1.2fr 1fr;
      gap: 8px;
      padding: 8px;
      height: calc(100vh - 50px);
      box-sizing: border-box;
    }
    section {
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px;
      box-sizing: border-box;
      overflow: auto;
      background: #0d1117;
    }
    h2 {
      margin-top: 0;
      font-size: 15px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 4px;
      margin-bottom: 6px;
    }
    .faction-select select {
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px 6px;
    }
    .unit-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .unit-card {
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .unit-card:hover {
      background: #161b22;
    }
    .unit-meta {
      font-size: 11px;
      opacity: 0.8;
    }

    .config-row {
      margin-bottom: 6px;
      font-size: 13px;
    }
    .config-row label {
      display: block;
      margin-bottom: 2px;
    }
    input[type="number"] {
      width: 80px;
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 4px;
    }
    .options-list {
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px;
      max-height: 140px;
      overflow: auto;
      font-size: 13px;
    }
    .options-list label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }
    button {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
    }
    button.secondary {
      background: #30363d;
    }
    button.danger {
      background: #da3633;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .points {
      font-weight: 600;
      font-size: 14px;
    }
    .army-unit {
      border-bottom: 1px solid #21262d;
      padding: 4px 0;
      font-size: 13px;
    }
    .army-unit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .army-unit-actions button {
      margin-left: 4px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .summary-row strong {
      font-weight: 600;
    }
    .validation {
      margin-top: 6px;
      font-size: 12px;
    }
    .validation-ok {
      color: #3fb950;
    }
    .validation-error {
      color: #f85149;
    }
    .pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 11px;
      margin-right: 4px;
    }
    .pill-ok { background: rgba(63,185,80,0.15); color: #3fb950; }
    .pill-err { background: rgba(248,81,73,0.15); color: #f85149; }
    .export-area {
      width: 100%;
      height: 120px;
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px;
      font-family: monospace;
      font-size: 11px;
      box-sizing: border-box;
    }

    /* --- CONFIG HEADER --- */
    .config-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .config-unit-name {
      font-size: 15px;
      font-weight: bold;
    }

    .config-points {
      font-size: 13px;
      font-weight: bold;
      color: #e6edf3;
    }

    /* --- SUB HEADER --- */
    .config-subtop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .config-unit-meta {
      font-size: 12px;
      opacity: 0.8;
    }

    .config-actions button {
      margin-left: 6px;
    }

    .save-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    #savedListContainer {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .saved-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px;
      border: 1px solid #30363d;
      border-radius: 4px;
      background: #161b22;
    }

    .saved-item button {
      margin-left: 6px;
    }

    /* --- MOBILE VERSION --- */
    @media (max-width: 768px) {
      .config-top,
      .config-subtop {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }

      .config-actions {
        width: 100%;
        display: flex;
        justify-content: flex-end;
        gap: 6px;
      }
    }

    /* --- MOBILE MODE --- */
    .mobile-only {
      display: none;
    }
    @media (max-width: 768px) {
      header { display: none; }
      main {
        display: block;
        height: auto;
      }
      section {
        display: none;
        height: auto;
        max-height: none;
      }
      .mobile-only {
        display: flex;
        gap: 6px;
        margin: 8px;
      }
      #mobileTabs button {
        flex: 1;
        background: #30363d;
        padding: 6px;
        border-radius: 4px;
        font-size: 14px;
      }
      /* Tab attiva */
      #mobileTabs button.active-tab {
        background: #1b1f23; /* stesso colore delle section */
        border-color: #1b1f23;
        font-weight: bold;
      }
      #settingsControls {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      #settingsControls select,
      #settingsControls input {
        width: 100%;
      }
      #titleEsercito {
        display: none
      }
      #titleConfig {
        display: none
      }
      #titleUnit {
        display: none
      }
      body[data-tab="settings"] #settingsSection { display: block; }
      body[data-tab="units"] #unitListSection { display: block; }
      body[data-tab="config"] #configSection { display: block; }
      body[data-tab="army"] #armySection { display: block; }
    }

    @media (min-width: 768px) {
      #settingsSection { display: none; }
    }

    @media (max-width: 768px) {
      body[data-tab="saves"] #savesSection { display: block; }
    }

    .global-actions {
/*       display: flex; */
      gap: 6px;
      margin-left: 8px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px;
      width: 280px;
    }

    .modal button {
/*       width: 100%; */
      margin-bottom: 6px;
    }

  </style>
